version: '3.8'

services:
  voxelforge:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: voxelforge
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-please_change_this_secret_in_production}
      - DATA_PATH=/app/data
      - PORT=3000
    volumes:
      - ./voxelforge-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
